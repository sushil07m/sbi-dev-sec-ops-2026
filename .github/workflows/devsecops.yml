name: EMS DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  devsecops:
    name: Security Scan + Build + DAST
    runs-on: ubuntu-latest

    steps:

    # ── 1. Checkout ─────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ── 2. Java setup ──────────────────────────────────────────
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ── 3. Secrets scan (detect-secrets) ───────────────────────
    - name: Scan for secrets (detect-secrets)
      run: |
        pip install detect-secrets --quiet
        detect-secrets scan . \
          --exclude-files '.git/.*' \
          --exclude-files 'target/.*' \
          > /tmp/secrets.json
        detect-secrets audit /tmp/secrets.json --report || true

    # ── 4. Git history secrets scan (gitleaks) ────────────────
    - name: Scan git history for secrets (gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── 5. Build + Test ───────────────────────────────────────
    - name: Build and test
      run: mvn clean verify -q
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

    # ── 6. SAST — SonarCloud (FIXED) ──────────────────────────
    - name: SAST — SonarCloud scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        JWT_SECRET:  ${{ secrets.JWT_SECRET_TEST }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=vaman-pundit_sbi-dev-sec-ops-2026 \
          -Dsonar.organization=vaman-pundit \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true

    # ── 7. SCA — Dependency Check ─────────────────────────────
    - name: SCA — OWASP Dependency-Check
      run: |
        mvn dependency-check:check \
          -DfailBuildOnCVSS=7 \
          -Dformat=HTML \
          -DoutputDirectory=target/dependency-check-report

    - name: Upload Dependency-Check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: target/dependency-check-report/

    # ── 8. Docker Build ───────────────────────────────────────
    - name: Build Docker image
      run: docker build -t sbi-ems:${{ github.sha }} .

    # ── 9. Container Scan — Trivy ─────────────────────────────
    - name: Container scan — Trivy
      run: |
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $HOME/.cache/trivy:/root/.cache/trivy \
          aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            sbi-ems:${{ github.sha }}

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif

    # ── 10. Dockerfile scan ───────────────────────────────────
    - name: Dockerfile scan — Trivy config
      run: |
        docker run --rm \
          -v $(pwd):/workspace \
          aquasec/trivy:latest config \
          /workspace/Dockerfile

    # ── 11. Run app for DAST ──────────────────────────────────
    - name: Start EMS container
      run: |
        docker run -d --name ems-dast \
          -p 8080:8080 \
          -e JWT_SECRET=${{ secrets.JWT_SECRET_TEST }} \
          sbi-ems:${{ github.sha }}

        echo "Waiting for app..."
        for i in $(seq 1 24); do
          if curl -sf http://localhost:8080/actuator/health > /dev/null; then
            echo "App is ready"
            break
          fi
          sleep 5
        done

    # ── 12. DAST — ZAP ───────────────────────────────────────
    - name: DAST — OWASP ZAP
      run: |
        docker run --network=host \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-api-scan.py \
            -t http://localhost:8080/v3/api-docs \
            -f openapi \
            -r zap-report.html \
            -I
      continue-on-error: true

    - name: Upload ZAP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: zap-report
        path: zap-report.html

    # ── 13. Cleanup ───────────────────────────────────────────
    - name: Stop container
      if: always()
      run: docker stop ems-dast || true